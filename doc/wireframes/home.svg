<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Background -->
  <rect width="400" height="500" fill="#1a1a2e" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="56" fill="#16213e" rx="8"/>
  <text x="20" y="36" fill="#fff" font-size="18" font-weight="bold" font-family="sans-serif">展開一覧</text>
  <!-- Import button -->
  <rect x="220" y="12" width="50" height="32" fill="#0f3460" rx="6"/>
  <text x="227" y="33" fill="#e0e0e0" font-size="11" font-family="sans-serif">Import</text>
  <!-- Download button -->
  <rect x="278" y="12" width="36" height="32" fill="#0f3460" rx="6"/>
  <text x="286" y="33" fill="#e0e0e0" font-size="14" font-family="sans-serif">DL</text>
  <!-- Plus button -->
  <rect x="322" y="12" width="60" height="32" fill="#e94560" rx="6"/>
  <text x="340" y="33" fill="#fff" font-size="18" font-family="sans-serif">+</text>

  <!-- Combo Card 1 -->
  <rect x="16" y="72" width="176" height="120" fill="#1a1a3e" stroke="#333" stroke-width="1" rx="8"/>
  <text x="28" y="96" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">天盃龍展開</text>
  <text x="28" y="114" fill="#aaa" font-size="10" font-family="sans-serif">初動札:</text>
  <rect x="28" y="122" width="32" height="32" fill="#333" rx="4"/>
  <rect x="64" y="122" width="32" height="32" fill="#333" rx="4"/>
  <rect x="100" y="122" width="32" height="32" fill="#333" rx="4"/>
  <text x="28" y="174" fill="#666" font-size="9" font-family="sans-serif">2026/03/01 更新</text>

  <!-- Combo Card 2 -->
  <rect x="208" y="72" width="176" height="120" fill="#1a1a3e" stroke="#333" stroke-width="1" rx="8"/>
  <text x="220" y="96" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">スネークアイ展開</text>
  <text x="220" y="114" fill="#aaa" font-size="10" font-family="sans-serif">初動札:</text>
  <rect x="220" y="122" width="32" height="32" fill="#333" rx="4"/>
  <rect x="256" y="122" width="32" height="32" fill="#333" rx="4"/>
  <text x="220" y="174" fill="#666" font-size="9" font-family="sans-serif">2026/02/28 更新</text>

  <!-- Combo Card 3 -->
  <rect x="16" y="208" width="176" height="120" fill="#1a1a3e" stroke="#333" stroke-width="1" rx="8"/>
  <text x="28" y="232" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">ユベル展開</text>
  <text x="28" y="250" fill="#aaa" font-size="10" font-family="sans-serif">初動札:</text>
  <rect x="28" y="258" width="32" height="32" fill="#333" rx="4"/>
  <rect x="64" y="258" width="32" height="32" fill="#333" rx="4"/>
  <text x="28" y="310" fill="#666" font-size="9" font-family="sans-serif">2026/02/20 更新</text>

  <!-- Combo Card 4 -->
  <rect x="208" y="208" width="176" height="120" fill="#1a1a3e" stroke="#333" stroke-width="1" rx="8"/>
  <text x="220" y="232" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">ライゼオル展開</text>
  <text x="220" y="250" fill="#aaa" font-size="10" font-family="sans-serif">初動札:</text>
  <rect x="220" y="258" width="32" height="32" fill="#333" rx="4"/>
  <text x="220" y="310" fill="#666" font-size="9" font-family="sans-serif">2026/02/15 更新</text>

  <!-- Label -->
  <text x="200" y="480" fill="#555" font-size="10" text-anchor="middle" font-family="sans-serif">ホーム画面</text>
</svg>
