<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Overlay -->
  <rect width="400" height="400" fill="rgba(0,0,0,0.6)"/>

  <!-- Modal -->
  <rect x="40" y="60" width="320" height="280" fill="#1e1e3a" rx="12" stroke="#444" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="96" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">ZIPファイルをインポート</text>

  <!-- Drop zone -->
  <rect x="60" y="112" width="280" height="120" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="8,4" rx="8"/>
  <text x="200" y="162" fill="#888" font-size="13" text-anchor="middle" font-family="sans-serif">ドラッグ&amp;ドロップ</text>
  <text x="200" y="180" fill="#888" font-size="11" text-anchor="middle" font-family="sans-serif">または</text>
  <!-- File select button -->
  <rect x="145" y="190" width="110" height="28" fill="#0f3460" rx="6"/>
  <text x="200" y="209" fill="#e0e0e0" font-size="11" text-anchor="middle" font-family="sans-serif">ファイルを選択</text>

  <!-- File info (shown after upload) -->
  <rect x="60" y="244" width="220" height="28" fill="#2a2a4a" rx="4"/>
  <text x="72" y="263" fill="#aaa" font-size="11" font-family="sans-serif">combo-data.zip (24KB)</text>
  <!-- Trash button -->
  <rect x="290" y="244" width="50" height="28" fill="#8b0000" rx="4"/>
  <text x="303" y="263" fill="#fff" font-size="11" font-family="sans-serif">削除</text>

  <!-- Action buttons -->
  <rect x="60" y="290" width="130" height="36" fill="#333" rx="6"/>
  <text x="125" y="313" fill="#ccc" font-size="13" text-anchor="middle" font-family="sans-serif">キャンセル</text>

  <rect x="210" y="290" width="130" height="36" fill="#e94560" rx="6"/>
  <text x="275" y="313" fill="#fff" font-size="13" text-anchor="middle" font-family="sans-serif">インポート</text>
</svg>
