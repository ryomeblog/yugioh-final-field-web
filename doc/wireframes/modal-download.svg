<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <!-- Overlay -->
  <rect width="400" height="450" fill="rgba(0,0,0,0.6)"/>

  <!-- Modal -->
  <rect x="40" y="40" width="320" height="370" fill="#1e1e3a" rx="12" stroke="#444" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="76" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">ダウンロードする展開を選択</text>

  <!-- Combo select card 1 (selected) -->
  <rect x="60" y="92" width="280" height="56" fill="#1a1a3e" stroke="#e94560" stroke-width="2" rx="8"/>
  <circle cx="80" cy="120" r="10" fill="#e94560"/>
  <text x="80" y="124" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">&#10003;</text>
  <text x="100" y="114" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">天盃龍展開</text>
  <text x="100" y="132" fill="#aaa" font-size="10" font-family="sans-serif">初動: 天盃龍パイドラ, 盃満ちる...</text>

  <!-- Combo select card 2 (not selected) -->
  <rect x="60" y="160" width="280" height="56" fill="#1a1a3e" stroke="#333" stroke-width="1" rx="8"/>
  <circle cx="80" cy="188" r="10" fill="none" stroke="#555" stroke-width="1"/>
  <text x="100" y="182" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">スネークアイ展開</text>
  <text x="100" y="200" fill="#aaa" font-size="10" font-family="sans-serif">初動: 蛇眼の炎龍, 原罪宝...</text>

  <!-- Combo select card 3 (selected) -->
  <rect x="60" y="228" width="280" height="56" fill="#1a1a3e" stroke="#e94560" stroke-width="2" rx="8"/>
  <circle cx="80" cy="256" r="10" fill="#e94560"/>
  <text x="80" y="260" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">&#10003;</text>
  <text x="100" y="250" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">ユベル展開</text>
  <text x="100" y="268" fill="#aaa" font-size="10" font-family="sans-serif">初動: ユベル, ナイトメア...</text>

  <!-- Combo select card 4 -->
  <rect x="60" y="296" width="280" height="56" fill="#1a1a3e" stroke="#333" stroke-width="1" rx="8"/>
  <circle cx="80" cy="324" r="10" fill="none" stroke="#555" stroke-width="1"/>
  <text x="100" y="318" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">ライゼオル展開</text>
  <text x="100" y="336" fill="#aaa" font-size="10" font-family="sans-serif">初動: ライゼオル・デュオ...</text>

  <!-- Action buttons -->
  <rect x="60" y="364" width="130" height="36" fill="#333" rx="6"/>
  <text x="125" y="387" fill="#ccc" font-size="13" text-anchor="middle" font-family="sans-serif">キャンセル</text>

  <rect x="210" y="364" width="130" height="36" fill="#e94560" rx="6"/>
  <text x="275" y="387" fill="#fff" font-size="13" text-anchor="middle" font-family="sans-serif">ダウンロード</text>
</svg>
