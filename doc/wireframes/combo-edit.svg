<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" width="400" height="700">
  <!-- Background -->
  <rect width="400" height="700" fill="#1a1a2e"/>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="56" fill="#16213e" rx="8"/>
  <!-- Back arrow -->
  <text x="16" y="36" fill="#e0e0e0" font-size="20" font-family="sans-serif">&lt;</text>
  <text x="46" y="36" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">展開作成</text>
  <!-- Header buttons -->
  <rect x="160" y="12" width="46" height="32" fill="#0f3460" rx="6"/>
  <text x="165" y="33" fill="#e0e0e0" font-size="10" font-family="sans-serif">Import</text>
  <rect x="212" y="12" width="32" height="32" fill="#0f3460" rx="6"/>
  <text x="220" y="33" fill="#e0e0e0" font-size="12" font-family="sans-serif">DL</text>
  <rect x="250" y="12" width="46" height="32" fill="#2e7d32" rx="6"/>
  <text x="258" y="33" fill="#fff" font-size="11" font-family="sans-serif">保存</text>
  <rect x="302" y="12" width="46" height="32" fill="#555" rx="6"/>
  <text x="310" y="33" fill="#999" font-size="11" font-family="sans-serif">削除</text>

  <!-- Title input -->
  <rect x="16" y="68" width="368" height="36" fill="#2a2a4a" stroke="#555" stroke-width="1" rx="6"/>
  <text x="28" y="91" fill="#888" font-size="13" font-family="sans-serif">展開タイトルを入力...</text>

  <!-- Starting Cards Section -->
  <text x="16" y="128" fill="#aaa" font-size="12" font-weight="bold" font-family="sans-serif">初動札</text>
  <rect x="16" y="136" width="368" height="64" fill="#1a1a3e" stroke="#444" stroke-width="1" rx="8"/>
  <!-- Drop slot -->
  <rect x="28" y="148" width="40" height="40" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2" rx="4"/>
  <text x="48" y="172" fill="#666" font-size="18" text-anchor="middle" font-family="sans-serif">+</text>
  <!-- Placed images -->
  <rect x="76" y="148" width="40" height="40" fill="#4a4a6a" rx="4"/>
  <rect x="124" y="148" width="40" height="40" fill="#4a4a6a" rx="4"/>
  <text x="220" y="174" fill="#666" font-size="10" font-family="sans-serif">画面下部から D&amp;D で配置</text>

  <!-- Interactive Card 1 (selected) -->
  <rect x="16" y="216" width="368" height="260" fill="#1a1a3e" stroke="#e94560" stroke-width="2" rx="8"/>
  <!-- Drag handle -->
  <rect x="20" y="220" width="16" height="252" fill="#2a2a4a" rx="4"/>
  <line x1="26" y1="330" x2="30" y2="330" stroke="#555" stroke-width="2"/>
  <line x1="26" y1="336" x2="30" y2="336" stroke="#555" stroke-width="2"/>
  <line x1="26" y1="342" x2="30" y2="342" stroke="#555" stroke-width="2"/>
  <line x1="26" y1="348" x2="30" y2="348" stroke="#555" stroke-width="2"/>
  <!-- Trash button -->
  <rect x="352" y="222" width="26" height="26" fill="#8b0000" rx="4"/>
  <text x="365" y="240" fill="#fff" font-size="12" text-anchor="middle" font-family="sans-serif">x</text>
  <!-- Step number -->
  <text x="46" y="240" fill="#e94560" font-size="12" font-weight="bold" font-family="sans-serif">Step 1</text>
  <!-- Text area -->
  <rect x="44" y="248" width="296" height="48" fill="#2a2a4a" stroke="#555" stroke-width="1" rx="4"/>
  <text x="56" y="270" fill="#ccc" font-size="11" font-family="sans-serif">天盃龍パイドラを通常召喚</text>
  <text x="56" y="286" fill="#ccc" font-size="11" font-family="sans-serif">効果発動、デッキから...</text>

  <!-- Board (5x5 grid) -->
  <text x="44" y="314" fill="#aaa" font-size="10" font-family="sans-serif">盤面:</text>
  <!-- Row 0: Opponent S/T (5 cells) -->
  <rect x="44" y="320" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="88" y="320" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="132" y="320" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="176" y="320" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="220" y="320" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <!-- Row 1: Opponent Monster (5 cells) -->
  <rect x="44" y="364" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="88" y="364" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="132" y="364" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="176" y="364" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="220" y="364" width="40" height="40" fill="#4a4a6a" stroke="#888" stroke-width="1" rx="2"/>
  <!-- Image with chain badge -->
  <circle cx="240" cy="384" r="10" fill="#e94560"/>
  <text x="240" y="388" fill="#fff" font-size="10" text-anchor="middle" font-family="sans-serif">1</text>
  <!-- Row 2: EX Zone (col 1,3 only) -->
  <!-- col 0: empty space -->
  <rect x="88" y="408" width="40" height="40" fill="#2a2a4a" stroke="#e94560" stroke-width="1" stroke-dasharray="3,2" rx="2"/>
  <text x="108" y="432" fill="#666" font-size="8" text-anchor="middle" font-family="sans-serif">EX</text>
  <!-- col 2: empty space -->
  <rect x="176" y="408" width="40" height="40" fill="#2a2a4a" stroke="#e94560" stroke-width="1" stroke-dasharray="3,2" rx="2"/>
  <text x="196" y="432" fill="#666" font-size="8" text-anchor="middle" font-family="sans-serif">EX</text>
  <!-- Row 3: My Monster (5 cells) -->
  <rect x="44" y="452" width="40" height="40" fill="#4a4a6a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="88" y="452" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="132" y="452" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="176" y="452" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>
  <rect x="220" y="452" width="40" height="40" fill="#2a2a4a" stroke="#444" stroke-width="1" rx="2"/>

  <!-- + Add card button -->
  <rect x="160" y="508" width="80" height="36" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,2" rx="8"/>
  <text x="200" y="531" fill="#666" font-size="18" text-anchor="middle" font-family="sans-serif">+</text>

  <!-- Fixed Bottom Image Gallery -->
  <rect x="0" y="556" width="400" height="144" fill="#16213e"/>
  <text x="16" y="576" fill="#aaa" font-size="11" font-weight="bold" font-family="sans-serif">画像一覧 (D&amp;D で盤面・初動札に配置)</text>
  <!-- Row 1 of images -->
  <rect x="16" y="584" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="76" y="584" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="136" y="584" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="196" y="584" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="256" y="584" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="316" y="584" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <!-- Row 2 of images -->
  <rect x="16" y="642" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="76" y="642" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="136" y="642" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="196" y="642" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="256" y="642" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <rect x="316" y="642" width="52" height="52" fill="#4a4a6a" rx="4"/>
  <!-- Scroll indicator -->
  <text x="384" y="630" fill="#555" font-size="16" font-family="sans-serif">&#8250;</text>
</svg>
